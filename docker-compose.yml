services:
  app:
    build: .
    ports:
      - "8501:8501"   # Streamlit UI
    environment:
      # Local file store for MLflow; mounted volume keeps runs across restarts.
      MLFLOW_TRACKING_URI: "file:/app/mlruns"
      MLFLOW_ALLOW_FILE_STORE: "true"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    command: >
      uv run streamlit run app/streamlit_app.py
      --server.address=0.0.0.0 --server.port=8501

  mlflow-ui:
    build: .
    ports:
      - "5000:5000"   # MLflow tracking UI
    environment:
      MLFLOW_TRACKING_URI: "file:/app/mlruns"
      MLFLOW_ALLOW_FILE_STORE: "true"
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      uv run mlflow ui
      --backend-store-uri file:/app/mlruns
      --host 0.0.0.0 --port 5000

  api:
    build: .
    ports:
      - "8000:8000"   # FastAPI prediction service
    environment:
      # Fixed-token auth — override before exposing this anywhere reachable.
      API_TOKEN: "changeme-dev-token"
      # Optional: pin a specific model version instead of the newest in ./models.
      # MODEL_VERSION_DIR: "/app/models/lightgbm__20260619T230000Z"
    volumes:
      - ./models:/app/models
    command: >
      uv run uvicorn fastapi_app.main:app
      --host 0.0.0.0 --port 8000
